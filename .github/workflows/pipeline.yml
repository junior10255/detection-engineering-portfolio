# Caminho sugerido: .github/workflows/pipeline.yml
name: Detection Portfolio Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - '**.yml'
      - '**.yaml'
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pyyaml sigma-cli

      - name: Run Organizer
        run: python organize.py

      - name: Commit and Push
        run: |
          git config --global user.name "DetectionBot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Auto-update: Dashboard & Metrics [skip ci]" || exit 0
          git push