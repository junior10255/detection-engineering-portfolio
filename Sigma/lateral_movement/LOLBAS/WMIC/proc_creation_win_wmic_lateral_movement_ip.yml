title: Movimentação Lateral via WMIC com Execução Remota
id: b3d2e1a5-8a4f-4d2a-9e8c-5f6a7b8c9d0e
status: test
description: |
    Detecta o uso do WMIC para execução de processos em sistemas remotos utilizando endereços IP.
    Esta técnica é frequentemente utilizada por atacantes para movimentação lateral na rede, evitando a resolução de nomes (DNS) e dificultando o rastreio básico.
author: Luiz Junior
date: 2026/04/09
references:
    - https://attack.mitre.org/techniques/T1047/
    - https://attack.mitre.org/techniques/T1021/006/
    - https://lolbas-project.github.io/lolbas/Binaries/Wmic/
tags:
    - attack.execution
    - attack.lateral_movement
    - attack.t1047
    - attack.t1021.006
logsource:
    product: windows
    category: process_creation
detection:
    selection_image:
        Image|endswith: '\wmic.exe'
    selection_process:
        CommandLine|contains|all:
            - 'process'
            - 'call'
            - 'create'
    selection_remote:
        CommandLine|contains:
            - '/node:'
            - '\\\\'
    selection_ip:
        CommandLine|re: '/.*[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}.*/'
    condition: selection_image and selection_process and selection_remote and selection_ip
falsepositives:
    - Scripts de administração de rede legados.
    - Ferramentas de deploy de software que utilizam WMI e IPs estáticos.
    - Atividades de inventário de TI em ambientes sem DNS configurado.
level: high
